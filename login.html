<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 어시팜 - 로그인/가입</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #28a745; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .toggle-link { margin-top: 20px; font-size: 0.9rem; color: #007bff; cursor: pointer; display: block; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Smart Assi-Farm</h2>
        <p id="auth-msg">구매를 위해 로그인이 필요합니다.</p>
        
        <!-- 로그인 폼 -->
        <div id="login-section">
            <div class="input-group">
                <label>아이디 (이메일)</label>
                <input type="email" id="login-email" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="login-pw" placeholder="비밀번호 입력">
            </div>
            <button class="btn-submit" onclick="handleLogin()">로그인 후 결제하기</button>
            <span class="switch-link toggle-link" onclick="toggleForm('join')">처음이신가요? 회원가입하기</span>
        </div>

        <!-- 회원가입 폼 섹션 -->
        <div id="join-section" style="display:none;">
            <div class="input-group">
                <label>이메일 (아이디)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="email" id="join-email" placeholder="example@email.com">
                    <button type="button" onclick="checkDuplicateEmail()" style="width: 100px; background: #666; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">중복확인</button>
                </div>
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="join-pw" placeholder="8자리 이상 입력">
            </div>
            <div class="input-group">
                <label>비밀번호 재확인</label>
                <input type="password" id="join-pw-confirm" placeholder="비밀번호 다시 입력">
            </div>
            <div class="input-group">
                <label>성함</label>
                <input type="text" id="join-name" placeholder="실명을 입력하세요">
            </div>
            <div class="input-group">
                <label>연락처</label>
                <input type="tel" id="join-hp" placeholder="010-0000-0000">
            </div>
            <div class="input-group">
                <label>배송지 주소</label>
                <input type="text" id="join-addr" placeholder="물건을 받으실 주소">
            </div>
            <button class="btn-submit" onclick="handleJoin()">정보 등록 및 가입완료</button>
            <span class="switch-link toggle-link" onclick="toggleForm('login')">이미 계정이 있나요? 로그인하기</span>
        </div>

    </div>

    <script>
let isEmailChecked = false;

    function checkDuplicateEmail() {
        const email = document.getElementById('join-email').value.trim();
        if (!email) { alert("이메일을 입력해주세요."); return; }
        alert("사용 가능한 이메일입니다.");
        isEmailChecked = true;
    }

    function handleLogin() {
        // 로그인 창에 입력한 값
        const inputEmail = document.getElementById('login-email').value.trim();
        const inputPw = document.getElementById('login-pw').value.trim();

        // 금고에서 꺼내온 값
        const savedEmail = localStorage.getItem('savedEmail');
        const savedPw = localStorage.getItem('savedPw');

        console.log("입력한 이메일:", inputEmail, "저장된 이메일:", savedEmail);

        if (!inputEmail || !inputPw) {
            alert("아이디와 비밀번호를 입력해주세요.");
            return;
        }

        // 정확히 일치하는지 대조
        if (inputEmail === savedEmail && inputPw === savedPw) {
            alert("로그인 성공! 결제 페이지로 이동합니다.");
            location.href = 'payment.html'; 
        } else {
            alert("아이디 또는 비밀번호가 일치하지 않습니다.\n입력값: " + inputEmail + "\n저장값: " + (savedEmail || "없음"));
        }
    }

    function handleJoin() {
        const email = document.getElementById('join-email').value.trim();
        const pw = document.getElementById('join-pw').value.trim();
        const pwConfirm = document.getElementById('join-pw-confirm').value.trim();
        const name = document.getElementById('join-name').value.trim();

        if (!email || !pw || !name) { alert("모든 정보를 입력해주세요."); return; }
        if (!isEmailChecked) { alert("중복확인을 먼저 해주세요."); return; }
        if (pw !== pwConfirm) { alert("비밀번호가 일치하지 않습니다."); return; }

        // 금고에 확실히 저장
        localStorage.setItem('savedEmail', email);
        localStorage.setItem('savedPw', pw);
        localStorage.setItem('savedName', name);

        alert(name + "님, 회원가입 완료! 이제 로그인을 진행해주세요.");
        toggleForm('login');
    }

    function toggleForm(type) {
        document.getElementById('login-section').style.display = type === 'join' ? 'none' : 'block';
        document.getElementById('join-section').style.display = type === 'join' ? 'block' : 'none';
    }

// [회원가입 처리 함수 - 최종 통합본]
function handleJoin() {
    // 1. 입력값 가져오기 (trim()을 사용해 앞뒤 공백 제거)
    const email = document.getElementById('join-email').value.trim();
    const pw = document.getElementById('join-pw').value.trim();
    const pwConfirm = document.getElementById('join-pw-confirm').value.trim();
    const name = document.getElementById('join-name').value.trim();

    // 2. 검사 순서 배치 (검문소 역할)
    if (!email || !pw || !name) {
        alert("모든 필수 항목을 입력해주세요.");
        return;
    }

    if (isEmailChecked === false) {
        alert("중복확인 버튼을 눌러 이메일 가용 여부를 먼저 확인해주세요.");
        return;
    }

    if (pw !== pwConfirm) {
        alert("비밀번호가 서로 일치하지 않습니다. 다시 확인해주세요.");
        return;
    }

    if (pw.length < 8) {
        alert("비밀번호는 최소 8자리 이상이어야 합니다.");
        return;
    }

    // 3. 모든 검사를 통과했을 때만 "금고(localStorage)"에 저장
    localStorage.setItem('savedEmail', email);
    localStorage.setItem('savedPw', pw);
    localStorage.setItem('savedName', name);

    // 4. 완료 메시지 및 화면 전환
    alert(name + "님, 정보가 안전하게 등록되었습니다! 이제 로그인을 해주세요.");
    console.log("등록 정보:", { email, name }); 
    
    toggleForm('login');
}

    </script>
</body>
</html>
